image: node:20

pipelines:
  pull-requests:
    '**':
      - step:
          name: Deploy Preview
          services: [docker]
          script:
            - apt-get update && apt-get install -y curl
            - curl -L https://fly.io/install.sh | sh
            - export PATH="$HOME/.fly/bin:$PATH"
            - npm ci
            - npx neonctl branches create --project-id $NEON_PROJECT_ID --name "preview/pr-${BITBUCKET_PR_ID}" --api-key $NEON_API_KEY || true
            - export DATABASE_URL=$(npx neonctl connection-string --project-id $NEON_PROJECT_ID --branch "preview/pr-${BITBUCKET_PR_ID}" --database-name neondb --pooled --api-key $NEON_API_KEY)
            - export FLY_APP="pr-${BITBUCKET_PR_ID}-nextjs-preview-poc"
            - flyctl apps create $FLY_APP || true
            - flyctl secrets set DATABASE_URL="$DATABASE_URL" --app $FLY_APP
            - flyctl deploy --app $FLY_APP --remote-only
            - |
              curl -s -X POST -u "${BB_AUTH_USER}:${BB_AUTH_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"content\": {\"raw\": \"**Preview:** https://${FLY_APP}.fly.dev\\n**Neon branch:** preview/pr-${BITBUCKET_PR_ID}\"}}" \
                "https://api.bitbucket.org/2.0/repositories/${BITBUCKET_REPO_FULL_NAME}/pullrequests/${BITBUCKET_PR_ID}/comments"

  custom:
    cleanup:
      - variables:
          - name: PR_ID
      - step:
          name: Cleanup Preview
          script:
            - curl -L https://fly.io/install.sh | sh && export PATH="$HOME/.fly/bin:$PATH"
            - flyctl apps destroy "pr-${PR_ID}-nextjs-preview-poc" --yes || true
            - npx neonctl branches delete "preview/pr-${PR_ID}" --project-id $NEON_PROJECT_ID --api-key $NEON_API_KEY || true
