name: Preview Deploy
on: [pull_request]

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  FLY_ORG: personal
  FLY_REGION: ams

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    concurrency:
      group: pr-${{ github.event.number }}

    steps:
      - uses: actions/checkout@v4

      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Create Neon branch
        id: neon
        if: vars.NEON_PROJECT_ID != ''
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Deploy to Fly.io
        id: deploy
        uses: superfly/fly-pr-review-apps@1.6.0
        with:
          secrets: >-
            ${{ steps.neon.outputs.db_url_with_pooler != '' &&
                format('DATABASE_URL={0}', steps.neon.outputs.db_url_with_pooler) || '' }}

      - name: Calculate build time
        id: duration
        run: |
          start=${{ steps.timer.outputs.start }}
          elapsed=$(( $(date +%s) - start ))
          mins=$(( elapsed / 60 ))
          secs=$(( elapsed % 60 ))
          echo "time=${mins}m ${secs}s" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            **Preview:** ${{ steps.deploy.outputs.url }}
            **Build time:** ${{ steps.duration.outputs.time }}
            ${{ steps.neon.outputs.db_url_with_pooler != '' &&
                format('**Neon branch:** preview/pr-{0}', github.event.number) || '**Neon:** not configured' }}
